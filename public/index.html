<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Browser FPS Multiplayer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    #overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div>WASD = bewegen, Maus = umsehen, Klick = schießen</div>
    <div id="status"></div>
  </div>

  <canvas id="canvas"></canvas>

 <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

    // Damit game.js darauf zugreifen kann:
    window.THREE = THREE;
    window.PointerLockControls = PointerLockControls;
</script>

<script src="game.js"></script>

</body>
</html>
